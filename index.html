<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Code-Youdle</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <header>
            <nav>
                <h1 onclick="openModal()">Code-Youdle</h1>
                <!-- No alt tag on the below imgs? This image is considered non-interactive since it's inside of the link/buttom. 
            aria-hidden causes assistive techniologies to skip over it. The image is not essential to functionality. -->
                <a
                    href="https://github.com/JakeSaintG/Code-Youdle"
                    target="_blank"
                    aria-label="New tab; Link out to Code-Youdle Github repo."
                >
                    <img
                        class="nav_img"
                        src="./img/github-brands-solid-full.svg"
                        aria-hidden="true"
                    />
                </a>
                <button
                    aria-label="toggle between light and dark mode"
                    onclick="
                        console.log('light/dark toggle not yet implemented')
                    "
                >
                    <img
                        class="nav_img"
                        src="./img/moon-solid-full.svg"
                        aria-hidden="true"
                    />
                </button>
            </nav>
        </header>

        <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
            <div class="modal">
                <h2>Credits</h2>
                <p>
                    Code-Youdle was created by Jake St. Germain and Michael
                    Duran
                </p>
                <p>Jake St. Germain - Navigation</p>
                <p>Cooper Dozier - Letter Grid</p>
                <p>Shawn Lawson - Modal Design</p>
                <p>Heather Lawson - Footer Design</p>
                <button id="credits-close-btn" onclick="closeModal()">
                    Close
                </button>
            </div>
        </div>
        <!-- TODO: Accessibility -->
        <!-- NOTE! These placeholders are subject to change from student/mentor contribution -->
        <main>
            <div class="guesses_placeholder">
                <div class="word-row" id="row-1">
                    <div class="box row-1" id="box-1"></div>
                    <div class="box row-1" id="box-2"></div>
                    <div class="box row-1" id="box-3"></div>
                    <div class="box row-1" id="box-4"></div>
                    <div class="box row-1" id="box-5"></div>
                </div>
                <div class="word-row" id="row-2">
                    <div class="box row-2" id="box-6"></div>
                    <div class="box row-2" id="box-7"></div>
                    <div class="box row-2" id="box-8"></div>
                    <div class="box row-2" id="box-9"></div>
                    <div class="box row-2" id="box-" 10></div>
                </div>
                <div class="word-row" id="row-3">
                    <div class="box row-3" id="box-11"></div>
                    <div class="box row-3" id="box-12"></div>
                    <div class="box row-3" id="box-13"></div>
                    <div class="box row-3" id="box-14"></div>
                    <div class="box row-3" id="box-15"></div>
                </div>
                <div class="word-row" id="row-4">
                    <div class="box row-4" id="box-16"></div>
                    <div class="box row-4" id="box-17"></div>
                    <div class="box row-4" id="box-18"></div>
                    <div class="box row-4" id="box-19"></div>
                    <div class="box row-4" id="box-" 20></div>
                </div>
                <div class="word-row" id="row-5">
                    <div class="box row-5" id="box-21"></div>
                    <div class="box row-5" id="box-22"></div>
                    <div class="box row-5" id="box-23"></div>
                    <div class="box row-5" id="box-24"></div>
                    <div class="box row-5" id="box-25"></div>
                </div>
                <div class="word-row" id="row-6">
                    <div class="box row-6" id="box-26"></div>
                    <div class="box row-6" id="box-27"></div>
                    <div class="box row-6" id="box-28"></div>
                    <div class="box row-6" id="box-29"></div>
                    <div class="box row-6" id="box-30"></div>
                </div>
            </div>

            <div id="keyboard" aria-label="keyboard"></div>
        </main>

        <footer class="footer_placeholder"></footer>
        <script src="js/app.js"></script>
    </body>
</html>
